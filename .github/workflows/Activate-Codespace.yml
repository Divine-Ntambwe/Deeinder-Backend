name: Resume Codespace

on:
  schedule:
    - cron: "0 8 * * *"   # runs every day at 8 AM UTC
  workflow_dispatch:       # allows manual trigger too

jobs:
  resume:
    runs-on: ubuntu-latest
    steps:
      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Resume Codespace via API
        env:
              GH_TOKEN: ${{ secrets.CODESPACES_TOKEN }}
        run: |
          gh api -X POST /user/codespaces/orange-space-engine-q76vr79xjgqgh9r97/start
          
